version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: network-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: network_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: network-redis
    ports:
      - '6379:6379'
    restart: always

volumes:
  postgres_data:
